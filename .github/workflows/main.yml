name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Files & Ensure index.html
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi

          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

          mkdir -p dist
          cp -r *.html *.js *.css assets images static dist/ 2>/dev/null || true

          INDEX_PATH=$(find . -name "index.html" -not -path "*/node_modules/*" -not -path "*/dist/*" | head -n 1)
          if [ -n "$INDEX_PATH" ]; then
            INDEX_DIR=$(dirname "$INDEX_PATH")
            cp -r "$INDEX_DIR"/* dist/ 2>/dev/null || true
          fi

          if [ ! -f dist/index.html ]; then
            echo '<!DOCTYPE html><html><head><title>Jalwa App</title></head><body><h1>Jalwa App</h1></body></html>' > dist/index.html
          fi

      - name: Setup Capacitor & Build APK
        run: |
          npx cap init Jalwa com.jalwa.app --web-dir dist || true
          rm -rf android
          npx cap add android
          npx cap sync android
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jalwa-App-Debug
          path: '**/android/app/build/outputs/apk/debug/app-debug.apk'
