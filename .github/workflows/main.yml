name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Auto-Detect & Prepare Project
        run: |
          # Agar package.json nahi hai toh dummy package.json create karein
          if [ ! -f package.json ]; then
            echo "Creating missing package.json..."
            npm init -y
          fi

          # Essential Capacitor tools install karein
          npm install @capacitor/core @capacitor/cli @capacitor/android

          # Agar build/dist folder nahi hai toh root files ko dist me copy karein
          if [ -f package.json ] && grep -q '"build":' package.json; then
            npm run build || true
          fi

          mkdir -p dist
          cp -r *.html *.js *.css assets images static dist/ 2>/dev/null || true
          if [ -d "build" ]; then cp -r build/* dist/; fi

      - name: Setup Capacitor & Build APK
        run: |
          npx cap init Jalwa com.jalwa.app --web-dir dist || true
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap sync android
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jalwa-App-Debug
          path: '**/android/app/build/outputs/apk/debug/app-debug.apk'
